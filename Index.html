<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
    }
    header {
      background: #2f3640;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>Mijn Dashboard</h1>
</header>

<div class="container">
  <div class="card">📊 Data 1</div>
  <div class="card">📈 Data 2</div>
  <div class="card">📋 Overzicht</div>
  <div class="card">⚙️ Instellingen</div>
</div>

</body>
</html>
